<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aukce - Auction SaaS Platform</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      background: #f8fafc;
      color: #0f172a;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #020617;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      color: #facc15;
    }

    .sidebar a {
      display: block;
      margin: 15px 0;
      color: #cbd5f5;
      text-decoration: none;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .btn {
      background: #facc15;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: #16a34a;
      font-weight: bold;
    }

    .bid {
      margin-top: 10px;
      background: #020617;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>Aukce</h2>
  <a href="#">Dashboard</a>
  <a href="#">Live Auctions</a>
  <a href="#"><a href="http://565755.shop/">shop</a>
<a href="http://565756.shop/">shop</a>
<a href="http://565757.shop/">shop</a></a>
 
</div>

<div class="main">

  <div class="topbar">
    <h1>Live Auctions 🔥</h1>
    <button class="btn">+ Create Auction</button>
  </div>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>iPhone 15 Pro</h3>
      <p class="price">Current Bid: $750</p>
      <button class="bid">Place Bid</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Gaming Laptop</h3>
      <p class="price">Current Bid: $1200</p>
      <button class="bid">Place Bid</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Smart Watch</h3>
      <p class="price">Current Bid: $180</p>
      <button class="bid">Place Bid</button>
    </div>

  </div>

  <footer>
    <p>© 2026 aukce.store — Auction SaaS Platform</p>
  </footer>

</div>

</body>
</html>
